# Garm App frontend — SPA + reverse-proxy to the two backends so the browser
# only ever talks to one origin (no CORS headaches, cookies/first-party).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Customer backend (orders/auth/account) → FAB backend :4000
  location /api/ {
    proxy_pass http://fab-backend:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # Catalog/coordinator/config → Admin backend :5050 (/api/garm/*)
  location /admin-api/ {
    proxy_pass http://admin-backend:5050/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # SPA fallback — every non-file route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
