
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <link rel="icon" type="image/svg+xml" href="/Haneef/favicon.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
      <title>Garm</title>
      <meta name="description" content="Garm is a sleek, mobile-first web app for textile sourcing and procurement." />
      <meta name="robots" content="noindex, nofollow" />
      <style>
        /* Lock the document itself — the app shell is a fixed, non-scrolling
           frame (like Zomato/Swiggy): only the CONTENT AREA inside each tab
           scrolls. Without position:fixed + overscroll-behavior, the iOS
           webview rubber-bands the whole page, so the header and bottom nav
           visibly ride up and down with every scroll. */
        html, body {
          height: 100%; margin: 0;
          position: fixed; inset: 0; width: 100%;
          overflow: hidden;
          overscroll-behavior: none;
          -webkit-text-size-adjust: 100%;
        }
        #root { height: 100%; overflow: hidden; }
      </style>

      <!-- "Add to Home Screen" support — iOS only reads apple-touch-icon (it
           ignores the web manifest for this), Android/Chrome use the manifest. -->
      <link rel="apple-touch-icon" href="/Haneef/apple-touch-icon.png" />
      <link rel="manifest" href="/Haneef/manifest.webmanifest" />
      <meta name="theme-color" content="#F8F7F5" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="default" />
      <meta name="apple-mobile-web-app-title" content="Garm" />
